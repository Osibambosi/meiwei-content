        run: |
          curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_RqaKeyMYmFyuTYX31rGwksL9IfzF/main"             -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || true
